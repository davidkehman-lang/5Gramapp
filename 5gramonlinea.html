<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5Gram Ultimate Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --tg-blue: #2488ff; --bg: #0f0f0f; --card: #1c1c1e; --text: #ffffff; --border: #262626; --msg-bg: #2c2c2e; }
        
        /* Стили тем */
        body.light-theme { --bg: #ffffff; --card: #f2f2f7; --text: #000000; --border: #d1d1d6; --msg-bg: #e5e5ea; }
        body.purple-theme { --tg-blue: #a333ff; --bg: #1a0b2e; --card: #2d164d; --text: #ffffff; --border: #3d2463; --msg-bg: #3d2463; }
        body.red-theme { --tg-blue: #ff3b30; --bg: #1c0000; --card: #3d0000; --text: #ffffff; --border: #5c0000; --msg-bg: #5c0000; }

        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: 0.3s; }
        .header { height: 60px; background: var(--card); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); z-index: 100; }
        .screen { display: none; padding: 15px; height: calc(100vh - 90px); overflow-y: auto; }
        .active-screen { display: block; }
        
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--tg-blue); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; flex-shrink: 0; overflow: hidden; }
        .item { padding: 12px; display: flex; align-items: center; border-bottom: 1px solid var(--border); cursor: pointer; }
        .btn { background: var(--tg-blue); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin: 5px 0; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: var(--msg-bg); border: none; border-radius: 10px; color: var(--text); box-sizing: border-box; outline: none; }

        /* Чат и сообщения */
        #chat-window { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: none; flex-direction: column; }
        #msg-box { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { padding: 10px 14px; border-radius: 15px; max-width: 75%; font-size: 15px; line-height: 1.4; }
        .my-msg { align-self: flex-end; background: var(--tg-blue); color: white; border-bottom-right-radius: 4px; }
        .his-msg { align-self: flex-start; background: var(--msg-bg); border-bottom-left-radius: 4px; }

        /* Звонки */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #remote-video { width: 100%; height: 70vh; border-radius: 20px; background: #000; object-fit: cover; }
        #local-video { width: 110px; height: 150px; position: absolute; bottom: 120px; right: 30px; border-radius: 12px; border: 2px solid var(--tg-blue); object-fit: cover; background: #222; }
        
        .verify-badge { color: #2488ff; margin-left: 4px; font-size: 14px; }
    </style>
</head>
<body onload="init()">

    <div id="auth-screen" style="display:none; flex-direction:column; justify-content:center; align-items:center; height:100vh; padding:30px;">
        <h1 style="color:var(--tg-blue); font-size: 40px; margin-bottom: 10px;">5Gram</h1>
        <p style="opacity: 0.6; margin-bottom: 30px;">Новое поколение мессенджеров</p>
        <input type="text" id="reg-n" placeholder="Ваше имя">
        <input type="text" id="reg-u" placeholder="@username">
        <button class="btn" onclick="register()">Начать общение</button>
    </div>

    <div id="main-app" style="display:none;">
        <div class="header">
            <div style="font-size:24px; cursor:pointer; width: 30px;" onclick="toggleMenu()">≡</div>
            <div style="flex-grow:1; text-align:center; font-weight:bold; font-size: 18px;" id="main-title">Чаты</div>
            <div class="avatar" id="top-av" style="cursor:pointer" onclick="showScreen('profile', 'Профиль')">?</div>
        </div>

        <div id="side-menu" style="position:fixed; top:60px; left:-260px; width:240px; background:var(--card); height:100%; transition:0.3s; z-index:99; border-right:1px solid var(--border);">
            <div class="item" onclick="showScreen('chats', 'Чаты')">💬 Все чаты</div>
            <div class="item" onclick="showScreen('search', 'Поиск')">🔍 Найти человека</div>
            <div class="item" onclick="showScreen('create', 'Создать')">➕ Группа / Канал</div>
            <div class="item" onclick="showScreen('settings', 'Настройки')">⚙️ Настройки тем</div>
            <div style="margin-top: 50px;" class="item" onclick="logout()">🚪 Выйти</div>
        </div>

        <div id="screen-chats" class="screen active-screen">
            <div id="chat-list"></div>
        </div>

        <div id="screen-search" class="screen">
            <h3>Поиск пользователей</h3>
            <input type="text" id="find-u" placeholder="Введите @username...">
            <button class="btn" onclick="searchUser()">Найти профиль</button>
        </div>

        <div id="screen-create" class="screen">
            <h3>Создать сообщество</h3>
            <input type="text" id="gr-n" placeholder="Название">
            <select id="gr-t">
                <option value="group">Группа (пишут все)</option>
                <option value="channel">Канал (пишут админы)</option>
            </select>
            <button class="btn" onclick="createChat()">Создать</button>
        </div>

        <div id="screen-settings" class="screen">
            <h3>Цветовая тема</h3>
            <button class="btn" style="background:#1c1c1e" onclick="setTheme('dark')">Черная классика</button>
            <button class="btn" style="background:#f2f2f7; color:#000" onclick="setTheme('light')">Чистая белая</button>
            <button class="btn" style="background:#a333ff" onclick="setTheme('purple')">Фиолетовый неон</button>
            <button class="btn" style="background:#ff3b30" onclick="setTheme('red')">Красный закат</button>
        </div>

        <div id="screen-profile" class="screen" style="text-align:center;">
            <div class="avatar" id="p-av" style="width:100px; height:100px; margin:20px auto; font-size:40px">?</div>
            <h2 id="p-n">Имя пользователя</h2>
            <p id="p-u" style="color:var(--tg-blue);"></p>
            <button class="btn" style="background:#333; margin-top: 20px;" onclick="document.getElementById('admin-modal').style.display='flex'">Ввести админ-код</button>
        </div>
    </div>

    <div id="chat-window">
        <div class="header">
            <div onclick="closeChat()" style="cursor:pointer; font-size: 20px; width: 30px;">←</div>
            <div id="h-av" class="avatar" style="width:34px; height:34px; margin:0 10px"></div>
            <div id="h-n" style="flex-grow:1; font-weight:bold;"></div>
            <div style="display:flex; gap:18px; margin-right:10px">
                <span onclick="startCall(false)" style="cursor:pointer; font-size: 20px;">📞</span>
                <span onclick="startCall(true)" style="cursor:pointer; font-size: 20px;">📹</span>
            </div>
        </div>
        <div id="msg-box"></div>
        <div id="input-area" style="padding:10px; display:flex; gap:10px; background:var(--card); border-top: 1px solid var(--border)">
            <input type="text" id="m-i" style="margin:0" placeholder="Написать сообщение...">
            <button class="btn" style="width:60px; margin:0" onclick="sendMsg()">➜</button>
        </div>
    </div>

    <div id="call-screen" class="modal">
        <h2 id="call-status">Звонок...</h2>
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        <div style="display:flex; gap:20px; margin-top: 30px;">
            <button class="btn" style="background:#ff3b30; width: 120px;" onclick="endCall()">Сбросить</button>
            <button id="answer-btn" class="btn" style="background:#4cd964; width: 120px; display:none;">Ответить</button>
        </div>
    </div>

    <div id="admin-modal" class="modal">
        <div style="background: var(--card); padding: 25px; border-radius: 20px; width: 80%; max-width: 300px;">
            <h3>Админ-панель</h3>
            <input type="text" id="ad-code" placeholder="Код подтверждения">
            <button class="btn" onclick="applyAdmin()">Активировать</button>
            <button class="btn" style="background:none; color: var(--text)" onclick="this.parentElement.parentElement.style.display='none'">Отмена</button>
        </div>
    </div>

    <script>
        // Инициализация базы данных (Ключи для примера)
        const _sb = supabase.createClient('https://kqcjrknckaqarlqxsgsb.supabase.co', 'sb_publishable_m4dYh5AxBbvA7N9aRadYIw_1oPLjHar');
        
        let db = { 
            profile: null, 
            chats: {"global": {n:"Глобальный чат", u:"Все пользователи", av:"G", isGlobal:true, type:'group'}}, 
            theme: 'dark' 
        };
        
        let peer, cur_id, cur_cloud_id, myStream, activeCall;

        async function init() {
            const saved = localStorage.getItem('5Gram_vFinal');
            if(saved) db = JSON.parse(saved);
            
            setTheme(db.theme || 'dark');

            if(db.profile) {
                document.getElementById('main-app').style.display = 'block';
                updateProfileUI();
                renderChats();
                initCallSystem(); 
                subscribeToMessages();
                syncWithCloud();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        }

        // --- ЛОГИКА ЗВОНКОВ (PeerJS) ---
        function initCallSystem() {
            const myID = db.profile.u.replace('@', '').toLowerCase();
            peer = new Peer(myID);

            peer.on('call', call => {
                document.getElementById('call-screen').style.display = 'flex';
                document.getElementById('call-status').innerText = "Входящий вызов";
                document.getElementById('answer-btn').style.display = 'block';
                
                document.getElementById('answer-btn').onclick = async () => {
                    myStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
                    document.getElementById('local-video').srcObject = myStream;
                    call.answer(myStream);
                    handleCallConnection(call);
                };
            });
        }

        async function startCall(withVideo) {
            const target = db.chats[cur_id].u.replace('@','').toLowerCase();
            try {
                myStream = await navigator.mediaDevices.getUserMedia({video:withVideo, audio:true});
                document.getElementById('local-video').srcObject = myStream;
                document.getElementById('call-screen').style.display = 'flex';
                document.getElementById('call-status').innerText = "Вызов...";
                
                const call = peer.call(target, myStream);
                handleCallConnection(call);
            } catch(e) { alert("Нет доступа к камере/микрофону"); }
        }

        function handleCallConnection(call) {
            activeCall = call;
            document.getElementById('answer-btn').style.display = 'none';
            call.on('stream', stream => {
                document.getElementById('remote-video').srcObject = stream;
                document.getElementById('call-status').innerText = "В разговоре";
            });
            call.on('close', endCall);
            call.on('error', endCall);
        }

        function endCall() {
            if(activeCall) activeCall.close();
            if(myStream) myStream.getTracks().forEach(t => t.stop());
            document.getElementById('call-screen').style.display = 'none';
            document.getElementById('remote-video').srcObject = null;
        }

        // --- ЛОГИКА ЧАТОВ И ПОИСКА ---
        async function searchUser() {
            const u = document.getElementById('find-u').value.trim();
            const tag = u.startsWith('@') ? u : '@'+u;
            const { data } = await _sb.from('profiles').select('*').eq('username', tag).single();
            
            if(data) {
                const chatID = 'pv_' + data.username.replace('@','');
                db.chats[chatID] = { n: data.display_name, u: data.username, av: data.display_name[0], type: 'pv' };
                save(); renderChats(); openChat(chatID);
            } else alert("Пользователь не найден в базе данных");
        }

        function createChat() {
            const n = document.getElementById('gr-n').value;
            const t = document.getElementById('gr-t').value;
            if(!n) return;
            const id = 'ch_' + Date.now();
            db.chats[id] = { n, u: (t==='channel'?'Канал':'Группа'), av: n[0], type: t };
            save(); renderChats(); showScreen('chats', 'Чаты');
        }

        async function openChat(id) {
            cur_id = id; const c = db.chats[id];
            cur_cloud_id = c.isGlobal ? 'global' : (c.type === 'pv' ? ['pv', db.profile.u, c.u].sort().join('_').replace(/@/g,'') : id);
            
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('h-n').innerText = c.n;
            document.getElementById('h-av').innerText = c.av;
            document.getElementById('input-area').style.display = (c.type==='channel' && !db.profile.b.d) ? 'none' : 'flex';
            
            loadHistory();
        }

        async function loadHistory() {
            const b = document.getElementById('msg-box'); b.innerHTML = 'Загрузка...';
            const { data } = await _sb.from('messages').select('*').eq('chat_id', cur_cloud_id).order('created_at', {ascending:true});
            b.innerHTML = '';
            if(data) data.forEach(addMsgToUI);
        }

        async function sendMsg() {
            const i = document.getElementById('m-i'); if(!i.value.trim()) return;
            const text = i.value; i.value = '';
            await _sb.from('messages').insert({ 
                text: text, 
                chat_id: cur_cloud_id, 
                sender_username: `${db.profile.n} (${db.profile.u})` 
            });
        }

        function addMsgToUI(m) {
            const b = document.getElementById('msg-box');
            const isMe = m.sender_username.includes(db.profile.u);
            const div = document.createElement('div');
            div.className = `msg-bubble ${isMe ? 'my-msg' : 'his-msg'}`;
            div.innerHTML = `<small style="display:block; font-size:10px; opacity:0.7; margin-bottom:4px">${m.sender_username.split(' (')[0]}</small>${m.text}`;
            b.appendChild(div);
            b.scrollTop = b.scrollHeight;
        }

        // --- СИСТЕМНЫЕ ФУНКЦИИ ---
        function setTheme(t) { db.theme = t; document.body.className = t + '-theme'; save(); }
        
        async function syncWithCloud() {
            if(!db.profile) return;
            await _sb.from('profiles').upsert({ 
                username: db.profile.u, display_name: db.profile.n, 
                avatar_data: db.profile.av, is_verified: db.profile.b.v == 1 
            }, { onConflict: 'username' });
        }

        function subscribeToMessages() {
            _sb.channel('realtime_msgs').on('postgres_changes', {event:'INSERT', table:'messages'}, p => {
                if(p.new.chat_id === cur_cloud_id) addMsgToUI(p.new);
            }).subscribe();
        }

        function renderChats() {
            const l = document.getElementById('chat-list'); l.innerHTML = '';
            Object.keys(db.chats).forEach(id => {
                const c = db.chats[id];
                l.innerHTML += `<div class="item" onclick="openChat('${id}')">
                    <div class="avatar">${c.av}</div>
                    <div style="margin-left:12px; flex-grow:1"><b>${c.n}</b><br><small style="color:var(--tg-blue)">${c.u}</small></div>
                </div>`;
            });
        }

        function register() {
            const n = document.getElementById('reg-n').value, u = document.getElementById('reg-u').value;
            if(n && u) {
                db.profile = { n, u: '@'+u.replace('@','').trim(), av: n[0].toUpperCase(), b:{v:0,d:0} };
                save(); location.reload();
            } else alert("Заполните все поля");
        }

        function applyAdmin() {
            const c = document.getElementById('ad-code').value;
            if(c==="201467192029387") db.profile.b.v = 1; // Галочка
            if(c==="828391937381918") db.profile.b.d = 1; // Админ (может писать в каналы)
            save(); location.reload();
        }

        function updateProfileUI() {
            document.getElementById('p-n').innerText = db.profile.n + (db.profile.b.v ? ' ✓' : '');
            document.getElementById('p-u').innerText = db.profile.u;
            document.getElementById('p-av').innerText = db.profile.av;
            document.getElementById('top-av').innerText = db.profile.av;
        }

        function save() { localStorage.setItem('5Gram_vFinal', JSON.stringify(db)); }
        function toggleMenu() { const m = document.getElementById('side-menu'); m.style.left = (m.style.left === '0px' ? '-260px' : '0px'); }
        function showScreen(id, t) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById('screen-'+id).classList.add('active-screen');
            document.getElementById('main-title').innerText = t; toggleMenu();
        }
        function closeChat() { document.getElementById('chat-window').style.display='none'; cur_cloud_id = null; }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
