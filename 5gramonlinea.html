<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5Gram Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --tg-blue: #2488ff; --bg: #0f0f0f; --card: #1c1c1e; --text: #ffffff; --border: #262626; --msg-bg: #2c2c2e; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        .header { height: 60px; background: var(--card); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); z-index: 100; }
        .screen { display: none; padding: 15px; height: calc(100vh - 90px); overflow-y: auto; }
        .active-screen { display: block; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--tg-blue); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .item { padding: 15px; display: flex; align-items: center; border-bottom: 1px solid var(--border); cursor: pointer; }
        .btn { background: var(--tg-blue); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin: 5px 0; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: var(--msg-bg); border: none; border-radius: 10px; color: var(--text); box-sizing: border-box; }
        #chat-window { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: none; flex-direction: column; }
        #msg-box { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { padding: 10px 14px; border-radius: 15px; max-width: 75%; background: var(--msg-bg); align-self: flex-start; }
        .my-msg { align-self: flex-end; background: var(--tg-blue); }
        .call-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; }
        video { width: 100%; height: 60vh; border-radius: 20px; background: #000; object-fit: cover; }
    </style>
</head>
<body onload="init()">

    <div id="auth-screen" style="display:none; flex-direction:column; justify-content:center; align-items:center; height:100vh; padding:30px;">
        <h1 style="color:var(--tg-blue)">5Gram</h1>
        <input type="text" id="reg-n" placeholder="Имя">
        <input type="text" id="reg-u" placeholder="Ник (без @)">
        <button class="btn" onclick="register()">Войти</button>
    </div>

    <div id="main-app" style="display:none;">
        <div class="header">
            <div style="flex-grow:1; font-weight:bold">5Gram</div>
            <div class="avatar" onclick="showScreen('search')">🔍</div>
        </div>
        <div id="screen-chats" class="screen active-screen"><div id="chat-list"></div></div>
        <div id="screen-search" class="screen">
            <input type="text" id="search-input" placeholder="Ник друга...">
            <button class="btn" onclick="addUser()">Добавить</button>
            <button class="btn" style="background:gray" onclick="showScreen('chats')">Назад</button>
        </div>
    </div>

    <div id="chat-window">
        <div class="header">
            <div onclick="closeChat()" style="padding-right:20px">←</div>
            <div id="h-n" style="flex-grow:1; font-weight:bold"></div>
            <div style="display:flex; gap:20px">
                <span onclick="makeCall(false)">📞</span>
                <span onclick="makeCall(true)">📹</span>
            </div>
        </div>
        <div id="msg-box"></div>
        <div style="padding:10px; display:flex; gap:10px; background:var(--card)">
            <input type="text" id="m-i" style="margin:0" placeholder="Сообщение...">
            <button class="btn" style="width:60px; margin:0" onclick="sendMsg()">➜</button>
        </div>
    </div>

    <div id="call-screen" class="call-modal">
        <video id="remote-video" autoplay playsinline></video>
        <h2 id="call-status">Звонок...</h2>
        <button class="btn" id="ans-btn" style="background:#4cd964; width:150px; display:none;">Ответить</button>
        <button class="btn" style="background:#ff3b30; width:150px; margin-top:10px;" onclick="endCall()">Завершить</button>
    </div>

    <script>
        const _sb = supabase.createClient('https://kqcjrknckaqarlqxsgsb.supabase.co', 'sb_publishable_m4dYh5AxBbvA7N9aRadYIw_1oPLjHar');
        let db = { profile: null, chats: {} };
        let peer, myStream, cur_call, cur_rec_u;

        async function init() {
            const s = localStorage.getItem('5gram_vfinal');
            if(s) db = JSON.parse(s);
            if(db.profile) {
                document.getElementById('main-app').style.display = 'block';
                renderChats();
                startPeer();
                subscribe();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        }

        function startPeer() {
            const id = db.profile.u.replace('@','').toLowerCase().trim();
            peer = new Peer(id);
            
            peer.on('call', call => {
                cur_call = call;
                document.getElementById('call-screen').style.display = 'flex';
                document.getElementById('call-status').innerText = "Вам звонят!";
                const ab = document.getElementById('ans-btn');
                ab.style.display = 'block';
                ab.onclick = async () => {
                    myStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
                    call.answer(myStream);
                    ab.style.display = 'none';
                    handleStream(call);
                };
            });
        }

        async function makeCall(v) {
            const tid = cur_rec_u.replace('@','').toLowerCase().trim();
            myStream = await navigator.mediaDevices.getUserMedia({video:v, audio:true});
            document.getElementById('call-screen').style.display = 'flex';
            cur_call = peer.call(tid, myStream);
            handleStream(cur_call);
        }

        function handleStream(call) {
            call.on('stream', s => {
                document.getElementById('remote-video').srcObject = s;
                document.getElementById('call-status').innerText = "В разговоре";
            });
        }

        function endCall() { location.reload(); }

        function register() {
            const n = document.getElementById('reg-n').value, u = document.getElementById('reg-u').value;
            if(n && u) {
                db.profile = { n, u: '@'+u.toLowerCase().trim() };
                localStorage.setItem('5gram_vfinal', JSON.stringify(db));
                location.reload();
            }
        }

        function addUser() {
            const u = document.getElementById('search-input').value.trim().toLowerCase();
            if(!u) return;
            db.chats[u] = { n: '@'+u, u: '@'+u };
            localStorage.setItem('5gram_vfinal', JSON.stringify(db));
            renderChats(); showScreen('chats');
        }

        function renderChats() {
            const l = document.getElementById('chat-list'); l.innerHTML = '';
            Object.keys(db.chats).forEach(id => {
                l.innerHTML += `<div class="item" onclick="openChat('${id}')"><div class="avatar">${id[0]}</div><b style="margin-left:10px">${db.chats[id].n}</b></div>`;
            });
        }

        function openChat(id) {
            cur_rec_u = db.chats[id].u;
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('h-n').innerText = db.chats[id].n;
            load();
        }

        async function sendMsg() {
            const i = document.getElementById('m-i'); if(!i.value) return;
            const cid = [db.profile.u, cur_rec_u].sort().join('_');
            await _sb.from('messages').insert([{ text: i.value, sender_username: db.profile.u, chat_id: cid }]);
            i.value = '';
        }

        async function load() {
            const cid = [db.profile.u, cur_rec_u].sort().join('_');
            const {data} = await _sb.from('messages').select('*').eq('chat_id', cid);
            document.getElementById('msg-box').innerHTML = '';
            if(data) data.forEach(d => {
                const b = document.createElement('div');
                b.className = `msg-bubble ${d.sender_username === db.profile.u ? 'my-msg' : ''}`;
                b.innerText = d.text;
                document.getElementById('msg-box').appendChild(b);
            });
        }

        function subscribe() {
            _sb.channel('m').on('postgres_changes', {event:'INSERT', table:'messages'}, p => {
                const cid = [db.profile.u, cur_rec_u].sort().join('_');
                if(p.new.chat_id === cid) load();
            }).subscribe();
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById('screen-'+id).classList.add('active-screen');
        }
        function closeChat() { document.getElementById('chat-window').style.display='none'; }
    </script>
</body>
</html>
